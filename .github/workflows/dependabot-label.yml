name: Dependabot Label

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  pull-requests: read
  issues: write

jobs:
  label:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2

      - name: Ensure labels exist
        run: |
          gh api "repos/$GH_REPO/labels/lib_minerpatch" >/dev/null 2>&1 || \
            gh api --method POST "repos/$GH_REPO/labels" \
              -f name="lib_minerpatch" \
              -f color="0E8A16" \
              -f description="Minor or patch dependency update"
          gh api "repos/$GH_REPO/labels/lib_major" >/dev/null 2>&1 || \
            gh api --method POST "repos/$GH_REPO/labels" \
              -f name="lib_major" \
              -f color="B60205" \
              -f description="Major dependency update"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Choose label
        id: choose-label
        run: |
          case "${UPDATE_TYPE}" in
            version-update:semver-major)
              echo "label=lib_major" >> "$GITHUB_OUTPUT"
              ;;
            version-update:semver-minor|version-update:semver-patch)
              echo "label=lib_minerpatch" >> "$GITHUB_OUTPUT"
              ;;
          esac
        env:
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}

      - name: Add label
        if: steps.choose-label.outputs.label != ''
        run: gh api --method POST "repos/$GH_REPO/issues/$PR_NUMBER/labels" -f labels[]="$LABEL"
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          LABEL: ${{ steps.choose-label.outputs.label }}
